name: Spring Boot CI

# 1. 언제 이 테스트를 실행할 것인가?
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    # 2. 어떤 OS에서 테스트를 돌릴 것인가?
    runs-on: ubuntu-latest

    steps:
      # 3. 깃허브 서버로 내 코드를 내려받음
      - uses: actions/checkout@v4

      # 4. Java 21 버전을 우분투에 설치함
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 5. Gradle 빌드 도구에 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. 실제 테스트 및 빌드 실행
      - name: Build with Gradle
        run: ./gradlew build