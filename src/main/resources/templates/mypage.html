<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - 서일대학교 통합 좌석 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

    <style>
        body { background-color: #f4f6f9; }
        .navbar-brand img { height: 40px; margin-right: 10px; }

        .sidebar {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 1.5rem 1rem;
        }
        .list-group-item {
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem !important;
            margin-bottom: 0.5rem;
            color: #495057;
            font-weight: 600;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .list-group-item:hover { background-color: #f8f9fa; }
        .list-group-item.active {
            background-color: #0d6efd;
            color: white;
            box-shadow: 0 4px 10px rgba(13, 110, 253, 0.3);
        }
        .list-group-item i { margin-right: 10px; font-size: 1.2rem; vertical-align: middle; }

        .content-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 2.5rem;
            min-height: 500px;
        }

        .ticket-wrapper { max-width: 500px; margin: 0 auto; }
        .ticket-header {
            background: linear-gradient(135deg, #0d6efd, #0b5ed7);
            color: white;
            padding: 2rem;
            border-radius: 1rem 1rem 0 0;
            text-align: center;
        }
        .ticket-body {
            background: white;
            border: 2px solid #e9ecef;
            border-top: none;
            padding: 2rem;
            border-radius: 0 0 1rem 1rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .ticket-seat-num {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1;
            margin: 1rem 0;
            letter-spacing: -2px;
        }

        .custom-table th { background-color: #f8f9fa; border-bottom: 2px solid #dee2e6; color: #495057; }
        .custom-table td { vertical-align: middle; }

        .page-link { cursor: pointer; }

        /*  추가: 유효성 검사 에러 텍스트 스타일 */
        .invalid-feedback { font-size: 0.875rem; color: #dc3545; margin-top: 0.25rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand d-flex align-items-center m-0" href="/">
            <img src="/images/logo.png" alt="서일대학교 로고">
            <span class="fw-bold fs-4 text-primary">서일대학교</span>
        </a>
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav align-items-center gap-3">
                <li class="nav-item me-2">
                    <span class="fw-bold text-primary" th:text="${session.loginMember.name} + '님'"></span>
                    <span class="text-secondary fw-semibold">마이페이지</span>
                </li>
                <li class="nav-item"><a class="btn btn-outline-secondary btn-sm rounded-pill px-3 fw-bold" href="/seats/search">좌석 검색하기</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container my-5">
    <div class="row g-4">

        <div class="col-md-3">
            <div class="sidebar">
                <div class="text-center mb-4">
                    <div class="display-1 text-primary mb-2"><i class="bi bi-person-circle"></i></div>
                    <h5 class="fw-bold m-0" th:text="${session.loginMember.name}">이름</h5>
                    <small class="text-muted">서일대학교 학생</small>
                </div>

                <div class="list-group">
                    <button class="list-group-item active" id="nav-current" onclick="switchTab('current')">
                        <i class="bi bi-ticket-perforated"></i> 현재 이용 현황
                    </button>
                    <button class="list-group-item" id="nav-bookmark" onclick="switchTab('bookmark')">
                        <i class="bi bi-heart-fill text-danger"></i> 내 즐겨찾기
                    </button>
                    <button class="list-group-item" id="nav-history" onclick="switchTab('history')">
                        <i class="bi bi-clock-history"></i> 과거 이용 내역
                    </button>
                    <button class="list-group-item" id="nav-report" onclick="switchTab('report')">
                        <i class="bi bi-exclamation-triangle"></i> 고장/불편 신고 내역
                    </button>
                    <button class="list-group-item" id="nav-update" onclick="switchTab('update')">
                        <i class="bi bi-person-gear text-success"></i> 개인 정보 수정
                    </button>
                </div>

                <div class="mt-4 pt-3 border-top text-center">
                    <button class="btn btn-link text-muted text-decoration-none btn-sm fw-bold" onclick="withdrawMember()">
                        <i class="bi bi-person-x"></i> 시스템 회원 탈퇴
                    </button>
                </div>
            </div>
        </div>

        <div class="col-md-9">
            <div class="content-card position-relative">

                <div id="section-current" class="section-content">
                    <h4 class="fw-bold mb-4">현재 이용 현황</h4>
                    <div id="activeSeatArea" class="text-center py-5"></div>
                </div>

                <div id="section-bookmark" class="section-content" style="display: none;">
                    <h4 class="fw-bold mb-4">내 즐겨찾기 <i class="bi bi-heart-fill text-danger fs-5"></i></h4>
                    <div class="table-responsive">
                        <table class="table custom-table table-hover text-center align-middle">
                            <thead>
                            <tr>
                                <th>위치</th>
                                <th>유형</th>
                                <th>좌석 번호</th>
                                <th>현재 상태</th>
                                <th>액션</th>
                            </tr>
                            </thead>
                            <tbody id="bookmarkTableBody"></tbody>
                        </table>
                    </div>
                    <div id="bookmarkPagination" class="d-flex justify-content-center mt-4"></div>
                </div>

                <div id="section-history" class="section-content" style="display: none;">
                    <h4 class="fw-bold mb-4">과거 이용 내역</h4>
                    <div class="table-responsive">
                        <table class="table custom-table table-hover text-center align-middle">
                            <thead>
                            <tr>
                                <th>위치 / 유형</th> <th>좌석 번호</th>
                                <th>이용 시작 시간</th>
                                <th>이용 종료 시간</th>
                                <th>상태</th>
                            </tr>
                            </thead>
                            <tbody id="historyTableBody"></tbody>
                        </table>
                    </div>
                    <div id="historyPagination" class="d-flex justify-content-center mt-4"></div>
                </div>

                <div id="section-report" class="section-content" style="display: none;">
                    <h4 class="fw-bold mb-4">고장/불편 신고 내역</h4>
                    <div class="table-responsive">
                        <table class="table custom-table table-hover text-center align-middle">
                            <thead>
                            <tr>
                                <th>신고 날짜</th>
                                <th>위치 / 좌석</th>
                                <th>신고 내용</th>
                                <th>처리 상태</th>
                            </tr>
                            </thead>
                            <tbody id="reportTableBody"></tbody>
                        </table>
                    </div>
                    <div id="reportPagination" class="d-flex justify-content-center mt-4"></div>
                </div>

                <div id="section-update" class="section-content" style="display: none;">
                    <h4 class="fw-bold mb-4">개인 정보 수정 <i class="bi bi-person-gear text-success fs-5"></i></h4>

                    <div class="card border-0 shadow-sm" style="max-width: 500px; margin: 0 auto; background-color: #fafbfc;">
                        <div class="card-body p-4">
                            <form id="updateMemberForm" novalidate>

                                <div class="mb-3 text-start">
                                    <label for="updateName" class="form-label fw-bold">새로운 이름 (2~10자)</label>
                                    <input type="text" class="form-control form-control-lg" id="updateName" placeholder="변경할 이름을 입력하세요" th:value="${session.loginMember.name}">
                                    <div class="invalid-feedback fw-semibold">
                                        이름은 2자 이상 10자 이하로 입력해주세요.
                                    </div>
                                </div>

                                <div class="mb-3 text-start">
                                    <label for="updatePassword" class="form-label fw-bold">새 비밀번호 (8~20자)</label>
                                    <input type="password" class="form-control form-control-lg" id="updatePassword" placeholder="새로운 비밀번호를 입력하세요">
                                    <div class="invalid-feedback fw-semibold">
                                        비밀번호는 8자 이상 20자 이하로 입력해주세요.
                                    </div>
                                </div>

                                <div class="mb-4 text-start">
                                    <label for="updatePasswordConfirm" class="form-label fw-bold">새 비밀번호 확인</label>
                                    <input type="password" class="form-control form-control-lg" id="updatePasswordConfirm" placeholder="비밀번호를 다시 한 번 입력하세요">
                                    <div class="invalid-feedback fw-semibold">
                                        비밀번호가 일치하지 않습니다.
                                    </div>
                                </div>

                                <div class="d-grid mt-4">
                                    <button type="button" class="btn btn-primary btn-lg fw-bold" onclick="updateMemberInfo()">정보 수정하기</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const hash = window.location.hash;
        if (hash === '#bookmark') switchTab('bookmark');
        else if (hash === '#history') switchTab('history');
        else if (hash === '#report') switchTab('report');
        else if (hash === '#update') switchTab('update');
        else switchTab('current');
    });

    function switchTab(tabName) {
        document.querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.section-content').forEach(el => el.style.display = 'none');

        document.getElementById('nav-' + tabName).classList.add('active');
        document.getElementById('section-' + tabName).style.display = 'block';

        if(tabName === 'current') fetchActiveSeat();
        else if(tabName === 'bookmark') fetchBookmarks(0);
        else if(tabName === 'history') fetchHistory(0);
        else if(tabName === 'report') fetchReports(0);
    }

    function handleApiError(title, message) {
        Swal.fire(title, message, 'error');
    }

    function formatDate(dateString) {
        if(!dateString) return "-";
        const d = new Date(dateString);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function renderPagination(pageData, containerId, fetchFunctionName) {
        const container = document.getElementById(containerId);
        if (!pageData || pageData.totalPages <= 1) {
            container.innerHTML = '';
            return;
        }

        let html = '<ul class="pagination pagination-sm">';
        const prevDisabled = pageData.first ? 'disabled' : '';
        html += `<li class="page-item ${prevDisabled}"><a class="page-link" onclick="${fetchFunctionName}(${pageData.number - 1})">이전</a></li>`;

        for (let i = 0; i < pageData.totalPages; i++) {
            const active = (i === pageData.number) ? 'active' : '';
            html += `<li class="page-item ${active}"><a class="page-link" onclick="${fetchFunctionName}(${i})">${i + 1}</a></li>`;
        }

        const nextDisabled = pageData.last ? 'disabled' : '';
        html += `<li class="page-item ${nextDisabled}"><a class="page-link" onclick="${fetchFunctionName}(${pageData.number + 1})">다음</a></li>`;
        html += '</ul>';
        container.innerHTML = html;
    }

    // ==========================================
    //  신규 추가: 실시간 유효성 검사 로직
    // ==========================================
    const nameInput = document.getElementById('updateName');
    const pwdInput = document.getElementById('updatePassword');
    const pwdConfirmInput = document.getElementById('updatePasswordConfirm');

    function validateName() {
        const val = nameInput.value.trim();
        if (val.length < 2 || val.length > 10) {
            nameInput.classList.add('is-invalid');
            return false;
        } else {
            nameInput.classList.remove('is-invalid');
            return true;
        }
    }

    function validatePassword() {
        const val = pwdInput.value.trim();
        if (val.length < 8 || val.length > 20) {
            pwdInput.classList.add('is-invalid');
            return false;
        } else {
            pwdInput.classList.remove('is-invalid');
            return true;
        }
    }

    function validatePasswordMatch() {
        const pwd = pwdInput.value.trim();
        const confirmPwd = pwdConfirmInput.value.trim();

        // 비밀번호 확인 칸이 비어있을 때는 아직 에러 띄우지 않음
        if (confirmPwd.length === 0) {
            pwdConfirmInput.classList.remove('is-invalid');
            return false;
        }

        if (pwd !== confirmPwd) {
            pwdConfirmInput.classList.add('is-invalid');
            return false;
        } else {
            pwdConfirmInput.classList.remove('is-invalid');
            return true;
        }
    }

    // 사용자가 타자를 칠 때마다(input 이벤트) 실시간 검사 실행
    nameInput.addEventListener('input', validateName);
    pwdInput.addEventListener('input', () => {
        validatePassword();
        // 비밀번호를 수정하면, 확인란도 다시 검사해서 일치 여부를 즉시 갱신
        if (pwdConfirmInput.value.trim().length > 0) {
            validatePasswordMatch();
        }
    });
    pwdConfirmInput.addEventListener('input', validatePasswordMatch);


    function updateMemberInfo() {
        // 1. 제출 버튼 누를 때 최종 검사
        const isNameValid = validateName();
        const isPwdValid = validatePassword();
        const isMatchValid = validatePasswordMatch();

        if (!isNameValid || !isPwdValid || !isMatchValid) {
            Swal.fire('입력 오류', '입력 조건을 다시 확인해주세요.', 'warning');
            return;
        }

        // 2. 검사 통과 시 서버로 데이터 전송
        const requestData = {
            name: nameInput.value.trim(),
            password: pwdInput.value.trim()
        };

        fetch('/api/members', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestData)
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'SUCCESS') {
                Swal.fire({
                    icon: 'success',
                    title: '수정 완료',
                    text: data.message || '개인 정보가 성공적으로 수정되었습니다.',
                    timer: 2000,
                    showConfirmButton: false
                }).then(() => {
                    window.location.reload();
                });
            } else {
                handleApiError('수정 실패', data.message);
            }
        })
        .catch(() => handleApiError('통신 오류', '서버와 통신할 수 없습니다.'));
    }

    // ==========================================
    // 기존 기능 로직
    // ==========================================
    function withdrawMember() {
        Swal.fire({
            title: '회원 탈퇴',
            text: "정말 탈퇴하시겠습니까? 현재 예약된 좌석 및 모든 이용 내역이 영구적으로 삭제되며 복구할 수 없습니다.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc3545',
            cancelButtonColor: '#6c757d',
            confirmButtonText: '네, 탈퇴합니다',
            cancelButtonText: '취소',
            reverseButtons: true
        }).then((result) => {
            if (result.isConfirmed) {
                fetch('/api/members', { method: 'DELETE' })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'SUCCESS') {
                        Swal.fire({
                            icon: 'success', title: '탈퇴 완료', text: '그동안 시스템을 이용해 주셔서 감사합니다.', timer: 2000, showConfirmButton: false
                        }).then(() => { window.location.href = '/'; });
                    } else { handleApiError('탈퇴 실패', data.message); }
                })
                .catch(() => handleApiError('통신 오류', '서버와 통신할 수 없습니다.'));
            }
        });
    }

    function fetchActiveSeat() {
        fetch('/api/usage-history/active')
            .then(res => res.json())
            .then(res => {
                const area = document.getElementById('activeSeatArea');
                if (res.status === 'SUCCESS' && res.data) {
                    const seat = res.data;
                    area.innerHTML = `
                        <div class="ticket-wrapper">
                            <div class="ticket-header">
                                <h5 class="mb-0 text-white-50">현재 이용 중인 좌석</h5>
                                <h3 class="fw-bold mt-2 mb-2">${seat.buildingName} ${seat.floor}층</h3>
                                <span class="badge bg-light text-primary fs-6 px-3 py-2 rounded-pill shadow-sm">${seat.spaceType}</span>
                            </div>
                            <div class="ticket-body">
                                <p class="text-muted fw-bold mb-0">SEAT NUMBER</p>
                                <div class="ticket-seat-num text-primary">${seat.seatNumber}</div>
                                <hr class="my-4 border-2 border-dashed text-muted">
                                <div class="d-flex justify-content-between mb-4">
                                    <div class="text-start">
                                        <small class="text-muted d-block">이용 시작</small>
                                        <span class="fw-bold">${formatDate(seat.startTime)}</span>
                                    </div>
                                    <div class="text-end">
                                        <small class="text-muted d-block">상태</small>
                                        <span class="badge bg-success fs-6">${seat.status}</span>
                                    </div>
                                </div>
                                <div class="d-grid gap-2">
                                    <button class="btn btn-danger btn-lg fw-bold" onclick="stopSeat(${seat.seatId})">
                                        <i class="bi bi-box-arrow-right"></i> 퇴실 (반납)하기
                                    </button>
                                    <div class="d-flex gap-2 mt-2">
                                        <button class="btn btn-outline-secondary w-50 fw-bold" onclick="toggleBookmark(${seat.seatId})">
                                            <i class="bi bi-heart-fill text-danger"></i> 즐겨찾기
                                        </button>
                                        <button class="btn btn-outline-warning w-50 fw-bold text-dark" onclick="openReportModal(${seat.seatId})">
                                            <i class="bi bi-exclamation-triangle-fill"></i> 고장 신고
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    area.innerHTML = `
                        <div class="py-5">
                            <i class="bi bi-ticket text-muted" style="font-size: 5rem;"></i>
                            <h4 class="fw-bold mt-4 text-secondary">현재 이용 중인 좌석이 없습니다.</h4>
                            <p class="text-muted">열람실이나 스터디 라운지를 예약하고 사용해보세요.</p>
                            <a href="/seats/search" class="btn btn-primary mt-3 px-4 py-2 fw-bold rounded-pill">좌석 예약하러 가기</a>
                        </div>
                    `;
                }
            })
            .catch(() => handleApiError('오류', '데이터를 불러오지 못했습니다.'));
    }

    function stopSeat(seatId) {
        Swal.fire({
            title: '퇴실하시겠습니까?', text: "반납 후에는 취소할 수 없습니다.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#dc3545', confirmButtonText: '네, 퇴실합니다', cancelButtonText: '취소'
        }).then((result) => {
            if (result.isConfirmed) {
                fetch(`/api/seats/${seatId}/stop`, { method: 'POST' })
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === 'SUCCESS') { Swal.fire('반납 완료', '정상적으로 퇴실 처리되었습니다.', 'success'); fetchActiveSeat(); }
                        else { handleApiError('오류', data.message); }
                    });
            }
        });
    }

    function fetchBookmarks(page = 0) {
        fetch(`/api/bookmarks/me?page=${page}`)
            .then(res => res.json())
            .then(res => {
                const tbody = document.getElementById('bookmarkTableBody');
                tbody.innerHTML = '';
                if (res.data.content.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="py-5 text-muted">등록된 즐겨찾기가 없습니다.</td></tr>';
                    document.getElementById('bookmarkPagination').innerHTML = '';
                    return;
                }
                res.data.content.forEach(bm => {
                    const statusBadge = bm.status === '이용 가능' ? `<span class="badge bg-primary">이용 가능</span>` : `<span class="badge bg-secondary">${bm.status}</span>`;
                    const reserveBtn = bm.status === '이용 가능' ? `<button class="btn btn-sm btn-outline-primary fw-bold" onclick="directReserve(${bm.seatId})">바로 예약</button>` : `<button class="btn btn-sm btn-outline-secondary fw-bold" disabled>예약 불가</button>`;
                    tbody.innerHTML += `
                        <tr>
                            <td class="fw-bold">${bm.buildingName} ${bm.floor}층</td>
                            <td>${bm.spaceType}</td>
                            <td class="fs-5 fw-bold text-dark">${bm.seatNumber}</td>
                            <td>${statusBadge}</td>
                            <td>
                                ${reserveBtn}
                                <button class="btn btn-sm btn-light text-danger" onclick="toggleBookmark(${bm.seatId}, true)" title="즐겨찾기 해제"><i class="bi bi-trash3-fill"></i></button>
                            </td>
                        </tr>
                    `;
                });
                renderPagination(res.data, 'bookmarkPagination', 'fetchBookmarks');
            });
    }

    function directReserve(seatId) {
        fetch(`/api/seats/${seatId}/start`, { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'SUCCESS') {
                    Swal.fire({icon: 'success', title: '예약 완료!', text: '좌석이 예약되었습니다.', timer: 1500, showConfirmButton: false}).then(() => { switchTab('current'); });
                } else { handleApiError('예약 실패', data.message); }
            });
    }

    function toggleBookmark(seatId, isFromList = false) {
        fetch(`/api/bookmarks/${seatId}`, { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'SUCCESS') {
                    Swal.fire({icon: 'success', title: '완료', text: data.message, timer: 1000, showConfirmButton: false});
                    if(isFromList) fetchBookmarks(0);
                } else { handleApiError('오류', data.message); }
            });
    }

    function fetchHistory(page = 0) {
        fetch(`/api/usage-history/me?page=${page}`)
            .then(res => res.json())
            .then(res => {
                const tbody = document.getElementById('historyTableBody');
                tbody.innerHTML = '';
                if (res.data.content.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="py-5 text-muted">이용 내역이 없습니다.</td></tr>';
                    document.getElementById('historyPagination').innerHTML = '';
                    return;
                }
                res.data.content.forEach(h => {
                    const badgeColor = h.status === '이용 종료됨' ? 'bg-secondary' : 'bg-primary';
                    tbody.innerHTML += `
                        <tr>
                            <td><span class="fw-bold">${h.buildingName} ${h.floor}층</span><br><small class="text-muted">${h.spaceType}</small></td>
                            <td class="text-primary fw-bold fs-5">${h.seatNumber}</td>
                            <td>${formatDate(h.startTime)}</td>
                            <td>${formatDate(h.endTime)}</td>
                            <td><span class="badge ${badgeColor}">${h.status}</span></td>
                        </tr>
                    `;
                });
                renderPagination(res.data, 'historyPagination', 'fetchHistory');
            });
    }

    function fetchReports(page = 0) {
        fetch(`/api/reports/me?page=${page}`)
            .then(res => res.json())
            .then(res => {
                const tbody = document.getElementById('reportTableBody');
                tbody.innerHTML = '';
                if (res.data.content.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="py-5 text-muted">신고 내역이 없습니다.</td></tr>';
                    document.getElementById('reportPagination').innerHTML = '';
                    return;
                }
                res.data.content.forEach(r => {
                    let statusBadge = '';
                    if(r.status === '접수 대기') statusBadge = '<span class="badge bg-warning text-dark">접수 대기</span>';
                    else if(r.status === '점검 중') statusBadge = '<span class="badge bg-danger">점검 중</span>';
                    else statusBadge = '<span class="badge bg-success">점검 완료</span>';
                    tbody.innerHTML += `
                        <tr>
                            <td>${formatDate(r.createdAt)}</td>
                            <td><span class="fw-bold">${r.buildingName} ${r.floor}층</span> <br> <small class="text-muted">${r.seatNumber}</small></td>
                            <td class="text-start">${r.content}</td>
                            <td>${statusBadge}</td>
                        </tr>
                    `;
                });
                renderPagination(res.data, 'reportPagination', 'fetchReports');
            });
    }

    function openReportModal(seatId) {
        Swal.fire({
            title: '고장/불편 신고', input: 'textarea', inputLabel: '어떤 문제가 있는지 상세히 적어주세요.', inputPlaceholder: '내용을 입력하세요...', showCancelButton: true, confirmButtonColor: '#ffc107', confirmButtonText: '신고 접수', cancelButtonText: '취소',
            inputValidator: (value) => { if (!value) return '신고 내용을 입력해주세요!'; }
        }).then((result) => {
            if (result.isConfirmed) {
                fetch('/api/reports', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ seatId: seatId, content: result.value }) })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'SUCCESS') { Swal.fire('접수 완료', data.message, 'success').then(() => { fetchActiveSeat(); }); }
                    else { handleApiError('신고 실패', data.message); }
                });
            }
        });
    }
</script>
</body>
</html>
