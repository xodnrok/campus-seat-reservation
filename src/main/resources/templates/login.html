<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 서일대학교 통합 좌석 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            border: none;
            border-radius: 1.5rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            background-color: white;
            padding: 2.5rem 2rem;
        }
        .brand-logo {
            height: 50px;
            margin-bottom: 1.5rem;
        }
        .nav-pills .nav-link {
            border-radius: 0.5rem;
            color: #6c757d;
            font-weight: 600;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
        }
        .nav-pills .nav-link.active {
            background-color: #0d6efd;
            color: white;
            box-shadow: 0 4px 10px rgba(13, 110, 253, 0.3);
        }
        .form-floating > label {
            color: #6c757d;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #0d6efd;
        }
        .invalid-feedback {
            font-size: 0.85rem;
            font-weight: 500;
        }
        /*  비밀번호 눈 모양 아이콘 스타일 */
        .toggle-password {
            cursor: pointer;
            z-index: 5;
            font-size: 1.2rem;
            color: #6c757d;
            transition: color 0.2s;
        }
        .toggle-password:hover {
            color: #0d6efd;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="text-center">
        <a href="/">
            <img src="/images/logo.png" alt="서일대학교 로고" class="brand-logo">
        </a>
        <h4 class="fw-bold mb-4 text-dark">통합 좌석 관리 시스템</h4>
    </div>

    <ul class="nav nav-pills nav-justified mb-4" id="authTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane" type="button" role="tab">로그인</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="join-tab" data-bs-toggle="tab" data-bs-target="#join-pane" type="button" role="tab">회원가입</button>
        </li>
    </ul>

    <div class="tab-content" id="authTabsContent">

        <div class="tab-pane fade show active" id="login-pane" role="tabpanel" tabindex="0">
            <form id="loginForm">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="loginId" placeholder="아이디" required>
                    <label for="loginId"><i class="bi bi-person"></i> 아이디</label>
                </div>

                <div class="form-floating mb-4 position-relative">
                    <input type="password" class="form-control pe-5" id="loginPw" placeholder="비밀번호" required>
                    <label for="loginPw"><i class="bi bi-lock"></i> 비밀번호</label>
                    <i class="bi bi-eye-slash position-absolute top-50 end-0 translate-middle-y me-3 toggle-password"></i>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold fs-5 shadow-sm">
                    로그인
                </button>
            </form>
        </div>

        <div class="tab-pane fade" id="join-pane" role="tabpanel" tabindex="0">
            <form id="joinForm">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="joinId" placeholder="아이디" required>
                    <label for="joinId">아이디 (4~20자)</label>
                    <div class="invalid-feedback" id="joinIdError"></div>
                </div>

                <div class="form-floating mb-3 position-relative">
                    <input type="password" class="form-control pe-5" id="joinPw" placeholder="비밀번호" required>
                    <label for="joinPw">비밀번호 (8~20자)</label>
                    <i class="bi bi-eye-slash position-absolute top-50 end-0 translate-middle-y me-3 toggle-password"></i>
                    <div class="invalid-feedback" id="joinPwError"></div>
                </div>

                <div class="form-floating mb-4">
                    <input type="text" class="form-control" id="joinName" placeholder="이름" required>
                    <label for="joinName">이름 (2~10자)</label>
                    <div class="invalid-feedback" id="joinNameError"></div>
                </div>

                <button type="submit" class="btn btn-dark w-100 py-3 rounded-pill fw-bold fs-5 shadow-sm">
                    가입하기
                </button>
            </form>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    // ----------------------------------------
    //  주소창에 #join이 있으면 회원가입 탭을 자동으로 열어주는 로직
    // ----------------------------------------
    document.addEventListener("DOMContentLoaded", function() {
        if (window.location.hash === '#join') {
            const joinTab = new bootstrap.Tab(document.getElementById('join-tab'));
            joinTab.show();
        }
    });

    // ----------------------------------------
    //  비밀번호 눈 모양 토글 (보이기/숨기기) 로직
    // ----------------------------------------
    document.querySelectorAll('.toggle-password').forEach(function(icon) {
        icon.addEventListener('click', function() {
            const input = this.parentElement.querySelector('input'); // 같은 영역 안의 input 찾기
            if (input.type === 'password') {
                input.type = 'text'; // 텍스트로 변경 (보이게)
                this.classList.remove('bi-eye-slash');
                this.classList.add('bi-eye'); // 눈 뜬 아이콘으로 변경
            } else {
                input.type = 'password'; // 다시 패스워드로 변경 (숨기게)
                this.classList.remove('bi-eye');
                this.classList.add('bi-eye-slash'); // 눈 감은 아이콘으로 변경
            }
        });
    });

    // ----------------------------------------
    // 1. 로그인 처리 로직
    // ----------------------------------------
    document.getElementById('loginForm').addEventListener('submit', function (e) {
        e.preventDefault();

        const requestData = {
            loginId: document.getElementById('loginId').value,
            password: document.getElementById('loginPw').value
        };

        fetch('/api/members/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestData)
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'SUCCESS') {
                //  투박한 alert 대신 예쁜 SweetAlert2 팝업 적용
                Swal.fire({
                    icon: 'success',
                    title: '로그인 성공',
                    text: data.message,
                    confirmButtonColor: '#0d6efd',
                    timer: 1500, // 1.5초 후 자동 닫힘
                    timerProgressBar: true
                }).then(() => {
                    window.location.href = '/';
                });
            } else {
                // 에러 팝업
                Swal.fire({
                    icon: 'error',
                    title: '로그인 실패',
                    text: data.message,
                    confirmButtonColor: '#dc3545'
                });
            }
        })
        .catch(error => {
            console.error('Error:', error);
            Swal.fire('오류', '서버와 통신 중 에러가 발생했습니다.', 'error');
        });
    });

    // ----------------------------------------
    // 2. 회원가입 처리 로직
    // ----------------------------------------
    document.getElementById('joinForm').addEventListener('submit', function (e) {
        e.preventDefault();
        clearErrors();

        const requestData = {
            loginId: document.getElementById('joinId').value,
            password: document.getElementById('joinPw').value,
            name: document.getElementById('joinName').value
        };

        fetch('/api/members/join', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestData)
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'SUCCESS') {
                // 가입 성공 팝업
                Swal.fire({
                    icon: 'success',
                    title: '환영합니다!',
                    text: data.message,
                    confirmButtonColor: '#0d6efd'
                }).then(() => {
                    document.getElementById('joinForm').reset();
                    const loginTab = new bootstrap.Tab(document.getElementById('login-tab'));
                    loginTab.show();
                    document.getElementById('loginId').value = requestData.loginId;

                    // 패스워드 타입을 원래대로 숨김 상태로 복구
                    document.getElementById('joinPw').type = 'password';
                    document.querySelectorAll('.toggle-password').forEach(icon => {
                        icon.classList.remove('bi-eye');
                        icon.classList.add('bi-eye-slash');
                    });

                    document.getElementById('loginPw').focus();
                });
            } else {
                if (data.data != null && typeof data.data === 'object') {
                    showValidationErrors(data.data);
                } else {
                    Swal.fire({
                        icon: 'warning',
                        title: '가입 실패',
                        text: data.message,
                        confirmButtonColor: '#ffc107'
                    });
                }
            }
        })
        .catch(error => {
            console.error('Error:', error);
            Swal.fire('오류', '서버와 통신 중 에러가 발생했습니다.', 'error');
        });
    });

    function clearErrors() {
        const inputs = document.querySelectorAll('#joinForm .form-control');
        inputs.forEach(input => input.classList.remove('is-invalid'));
        document.querySelectorAll('.invalid-feedback').forEach(el => el.innerText = '');
    }

    function showValidationErrors(errors) {
        if (errors.loginId) {
            document.getElementById('joinId').classList.add('is-invalid');
            document.getElementById('joinIdError').innerText = errors.loginId;
        }
        if (errors.password) {
            document.getElementById('joinPw').classList.add('is-invalid');
            document.getElementById('joinPwError').innerText = errors.password;
        }
        if (errors.name) {
            document.getElementById('joinName').classList.add('is-invalid');
            document.getElementById('joinNameError').innerText = errors.name;
        }
    }
</script>
</body>
</html>
